<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALICE.SOLAS // AUDIO</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div data-include="header"></div>
    <div data-include="nav"></div>

    <main>
        <section class="content-box">
            <h2>AUDIO_FILES</h2>
            <p>A collection of my musical expressions and digital echoes.</p>
            <ul class="audio-list">
                <li><a href="#">bittersweet_echoes.mp3</a></li>
                <li><a href="#">cyan_dream.wav</a></li>
                <li><a href="#">digital_fox_lullaby.flac</a></li>
            </ul>
        </section>
    </main>

    <div data-include="footer"></div>

    <script>
        $(function () {
            var includes = $('[data-include]')
            $.each(includes, function () {
                var file = '/' + $(this).data('include') + '.html'
                $(this).load(file)
            })
        })
    </script>
</body>
</html>
